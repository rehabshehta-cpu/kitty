<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kitty Learn — تعلّم مخصص لطفلك" />
    <title>Kitty Learn — تعلّمي الخاص ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/kitty-learn.css" />
    <link rel="stylesheet" href="css/kitty-learn-personal.css" />
  </head>
  <body data-kitty-page="personal">
    <div id="loading-screen" class="loading-screen" role="status">
      <svg class="loader-cat" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <ellipse cx="110" cy="118" rx="56" ry="50" fill="#FFE5CC" />
      </svg>
      <p dir="rtl">تعلّمك الخاص<span class="loading-dots"></span></p>
    </div>
    <div class="sky-layer" aria-hidden="true">
      <div class="cloud cloud-sm"></div>
      <div class="cloud cloud-md"></div>
    </div>
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>

    <div class="page-wrap alphabet-kid-wrap">
      <header class="site-header kid-header">
        <a class="logo-link" href="index.html">
          <svg width="44" height="44" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <ellipse cx="110" cy="118" rx="56" ry="50" fill="#FFE5CC" />
          </svg>
          Kitty Learn
        </a>
        <div class="progress-pill">
          ⭐ <span id="header-stars">0</span>
          <span aria-hidden="true">·</span>
          Lv <span id="header-level">1</span>
        </div>
        <nav class="nav-links" aria-label="القائمة" dir="ltr">
          <a href="index.html">Home</a>
          <a href="my-learning.html" aria-current="page">My Learning</a>
          <a href="games.html">Games</a>
          <a href="kitty-room.html">Room</a>
        </nav>
        <div class="header-actions">
          <button type="button" class="icon-btn" id="music-toggle" aria-label="موسيقى" aria-pressed="false">🎵</button>
          <button type="button" class="icon-btn" id="theme-toggle" aria-label="سمة" aria-pressed="false">🌙</button>
        </div>
      </header>

      <main class="lesson-main-stack" id="personal-app">
        <div class="personal-mode-bar" role="tablist" aria-label="وضع التطبيق">
          <button type="button" class="personal-mode-btn active" id="personal-mode-child" role="tab" aria-selected="true">
            👶 تعلّم
          </button>
          <button type="button" class="personal-mode-btn" id="personal-mode-parent" role="tab" aria-selected="false">
            👩‍👧 للوالدين
          </button>
        </div>
        <div id="personal-root"></div>
      </main>

      <footer class="site-footer">
        <p><a href="index.html">← Back home</a></p>
      </footer>
    </div>

    <div id="mascot-dock" class="mascot-dock">
      <div class="mascot-bubble" hidden dir="rtl">يلا نتعلّم!</div>
      <div style="position: relative; display: inline-block">
        <span data-kitty-accessory aria-hidden="true"></span>
        <svg class="dock-cat" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" aria-label="Kitty helper">
          <ellipse cx="110" cy="118" rx="72" ry="64" fill="#FFE5CC" />
          <ellipse cx="82" cy="108" rx="12" ry="16" fill="#3D3558" />
          <ellipse cx="138" cy="108" rx="12" ry="16" fill="#3D3558" />
          <path d="M104 128 Q110 134 116 128" fill="#FF8FAB" />
        </svg>
      </div>
    </div>

    <script src="js/kitty-learn-core.js"></script>
    <script src="js/config.local.js"></script>
    <script src="js/script.js"></script>
    <script src="js/kitty-learn-trace.js"></script>
    <script src="js/kitty-learn-personal-store.js"></script>
    <script src="js/kitty-learn-personal.js"></script>
  </body>
</html>
