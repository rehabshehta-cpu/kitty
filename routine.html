<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitty Learn — الروتين اليومي 🧼</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/kitty-learn.css" />
  </head>
  <body class="page-routine">
    <div id="loading-screen" class="loading-screen" role="status">
      <svg class="loader-cat" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <ellipse cx="110" cy="118" rx="56" ry="50" fill="#FFE5CC" />
      </svg>
      <p dir="rtl">يوم منظم<span class="loading-dots"></span></p>
    </div>
    <div class="sky-layer" aria-hidden="true"><div class="cloud cloud-sm"></div></div>
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>

    <div class="page-wrap">
      <header class="site-header kid-header">
        <a class="logo-link" href="index.html">
          <svg width="44" height="44" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <ellipse cx="110" cy="118" rx="56" ry="50" fill="#FFE5CC" />
          </svg>
          Kitty Learn
        </a>
        <div class="progress-pill">
          ⭐ <span id="header-stars">0</span>
          <span aria-hidden="true">·</span>
          Lv <span id="header-level">1</span>
        </div>
        <nav class="nav-links" aria-label="القائمة" dir="ltr">
          <a href="index.html">Home</a>
          <a href="emotions.html">Emotions</a>
          <a href="space.html">Space</a>
          <a href="routine.html" aria-current="page">Routine</a>
          <a href="alphabet.html">Alphabet</a>
          <a href="animals.html">Animals</a>
          <a href="kitty-room.html">Room</a>
          <a href="quiz.html">Quiz</a>
          <a href="games.html">Games</a>
        </nav>
        <div class="header-actions">
          <button type="button" class="icon-btn" id="music-toggle" aria-label="موسيقى" aria-pressed="false">🎵</button>
          <button type="button" class="icon-btn" id="theme-toggle" aria-label="سمة" aria-pressed="false">🌙</button>
        </div>
      </header>

      <main class="lesson-main-stack">
        <header class="kid-alphabet-hero">
          <p class="kid-kicker" dir="ltr">🧼 Daily routine</p>
          <h1 class="kid-page-title">روتيني اليومي — خطوة بخطوة!</h1>
          <p class="kid-page-sub" dir="rtl">أنجز كل خطوة وضع علامة ✅ عند الانتهاء.</p>
        </header>

        <section class="lesson-page-panel">
          <div class="alphabet-lang-tabs" role="tablist" aria-label="لغة الروتين">
            <button type="button" class="alphabet-lang-tab" id="routine-tab-en" role="tab" aria-selected="false">🧼 English</button>
            <button type="button" class="alphabet-lang-tab active" id="routine-tab-ar" role="tab" aria-selected="true">روتين عربي</button>
          </div>
          <p id="routine-hint" class="color-palette-hint"></p>
          <div class="routine-progress-wrap">
            <div class="bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
              <div class="bar-fill" id="routine-progress-bar" style="width: 0%"></div>
            </div>
            <p id="routine-progress-label" class="routine-progress-label"></p>
          </div>
          <div id="routine-list" class="routine-list"></div>
          <button type="button" class="btn btn-secondary btn-fat" id="routine-reset">ابدأ من جديد 🔄</button>
        </section>

        <div class="kid-done-row">
          <button type="button" class="btn btn-primary btn-fat" id="lesson-done">خلّصتُ الروتين!</button>
        </div>
      </main>

      <footer class="site-footer"><p><a href="index.html" dir="ltr">← Back home</a></p></footer>
    </div>

    <div id="mascot-dock" class="mascot-dock">
      <div class="mascot-bubble" hidden>يوم منظم = يوم سعيد!</div>
      <div style="position: relative; display: inline-block">
        <span data-kitty-accessory aria-hidden="true"></span>
        <svg class="dock-cat" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" aria-label="مساعد القطة">
          <ellipse cx="110" cy="118" rx="72" ry="64" fill="#FFE5CC" />
        </svg>
      </div>
    </div>

    <script src="js/kitty-learn-core.js"></script>
    <script src="js/config.local.js"></script>
    <script src="js/script.js"></script>
    <script src="js/kitty-learn-routine.js"></script>
  </body>
</html>
