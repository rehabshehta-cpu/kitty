<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitty Learn — كلمات العيلة 💬</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/kitty-learn.css" />
  </head>
  <body class="page-family-words">
    <div id="loading-screen" class="loading-screen" role="status">
      <svg class="loader-cat" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <ellipse cx="110" cy="118" rx="56" ry="50" fill="#FFE5CC" />
      </svg>
      <p dir="rtl">كلمات حلوة<span class="loading-dots"></span></p>
    </div>
    <div class="sky-layer" aria-hidden="true">
      <div class="cloud cloud-sm"></div>
      <div class="cloud cloud-md"></div>
    </div>
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>

    <div class="page-wrap alphabet-kid-wrap">
      <header class="site-header kid-header">
        <a class="logo-link" href="index.html">
          <svg width="44" height="44" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <ellipse cx="110" cy="118" rx="56" ry="50" fill="#FFE5CC" />
          </svg>
          Kitty Learn
        </a>
        <div class="progress-pill">
          ⭐ <span id="header-stars">0</span>
          <span aria-hidden="true">·</span>
          Lv <span id="header-level">1</span>
        </div>
        <nav class="nav-links" aria-label="القائمة" dir="ltr">
          <a href="index.html">Home</a>
          <a href="alphabet.html">Alphabet</a>
          <a href="numbers.html">Numbers</a>
          <a href="colors.html">Colors</a>
          <a href="animals.html">Animals</a>
          <a href="words.html" aria-current="page">Words</a>
          <a href="games.html">Games</a>
        </nav>
        <div class="header-actions">
          <button type="button" class="icon-btn" id="music-toggle" aria-label="موسيقى" aria-pressed="false">🎵</button>
          <button type="button" class="icon-btn" id="theme-toggle" aria-label="سمة" aria-pressed="false">🌙</button>
        </div>
      </header>

      <main class="family-words-main">
        <header class="kid-alphabet-hero">
          <p class="kid-kicker" dir="ltr">💬 Family words</p>
          <h1 class="kid-page-title">كلمات من العيلة</h1>
          <p class="kid-page-sub" dir="rtl">
            اضغطي على بطاقة لتسمعي الاسم بالعربي. كرّري مع صوتك عشان تحفظيه!
          </p>
        </header>

        <section class="lesson-page-panel family-words-panel" aria-labelledby="family-words-heading">
          <h2 id="family-words-heading" class="numbers-panel-title">اختاري كلمة</h2>
          <div id="family-word-grid" class="family-word-grid"></div>
        </section>

        <section class="letter-display kid-letter-card family-word-display" aria-live="polite">
          <p class="family-display-emoji" id="family-display-emoji" aria-hidden="true">👵</p>
          <p class="family-display-phrase" id="family-display-phrase">تيتا نورا</p>
          <p class="family-display-hint" id="family-display-hint">تيتا حبيبة القلب</p>
          <button type="button" class="btn btn-secondary btn-fat" id="family-speak-btn">🔊 اسمعي تاني</button>
        </section>

        <div class="kid-done-row">
          <button type="button" class="btn btn-primary btn-fat" id="family-words-done">خلّصتِ تدريب الكلمات!</button>
          <p class="kid-done-note" dir="rtl">اضغطي مرة واحدة لمكافأة صغيرة ⭐</p>
        </div>
      </main>

      <footer class="site-footer">
        <p><a href="index.html" dir="ltr">← Back home</a></p>
      </footer>
    </div>

    <div id="mascot-dock" class="mascot-dock">
      <div class="mascot-bubble" hidden>يلا نقول الكلمات!</div>
      <div style="position: relative; display: inline-block">
        <span data-kitty-accessory aria-hidden="true"></span>
        <svg class="dock-cat" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" aria-label="مساعد القطة">
          <ellipse cx="110" cy="118" rx="72" ry="64" fill="#FFE5CC" />
          <ellipse cx="82" cy="108" rx="12" ry="16" fill="#3D3558" />
          <ellipse cx="138" cy="108" rx="12" ry="16" fill="#3D3558" />
          <path d="M104 128 Q110 134 116 128" fill="#FF8FAB" />
        </svg>
      </div>
    </div>

    <script src="js/kitty-learn-core.js"></script>
    <script src="js/config.local.js"></script>
    <script src="js/script.js"></script>
    <script src="js/kitty-learn-words.js"></script>
  </body>
</html>
